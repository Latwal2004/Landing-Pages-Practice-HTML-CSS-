<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Banner( CSS Positioning)</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
    <div class="image_container">
        <img src="./assets/bg_image.png" alt="background_img">
    </div>

    <div class="content">
        <img src="./assets/burger.png" class="burger">
        <img src="./assets/tomato.png" class="tomato-1">
        <img src="./assets/tomato.png" class="tomato-2">
        <img src="./assets/pizza.png" class="pizza">
        <img src="./assets/momo.png" class="momo">
        <img src="./assets/leaf.png" class="leaf">

        
    <div class="center-content">
        <section class="text-content">
            <h1>Better food <br>for more people</h1>
            <p>For over a decade, we’ve enabled our customers to discover new tastes, delivered right to their doorstep
            </p>
        </section>

        <!-- info section -->
        <section class="info-section">
             <div class="info-items">
              <img src="./assets/house.png" 
              alt="Restaurent-icon"
               class="info-icon">
              
               <div class="info-text">
                    <span class="info-number">3,0000+</span>
                    <span class="info-label">Restaurants</span>
              
                </div>
              </div>
             <div class="info-items">
              <img src="./assets/location.png" 
              alt="Restaurent-icon"
               class="info-icon">
              
               <div class="info-text">
                    <span class="info-number">800+</span>
                    <span class="info-label">cities</span>
              
                </div>
              </div>
             <div class="info-items">
              <img src="./assets/banner.png" 
              alt="Restaurent-icon"
               class="info-icon">
              
               <div class="info-text">
                    <span class="info-number">3 billion+</span>
                    <span class="info-label">orders delivered</span>
              
                </div>
              </div>
        </section>

    </div>
    </div>
</main>
</body>

</html>
