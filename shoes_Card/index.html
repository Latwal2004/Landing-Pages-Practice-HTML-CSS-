<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoes-Website(Page)</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <section class="images_section">
            <aside>
                <img src="/shoes_Card/IMG/side_image1.png" alt="Side Image 1">
                <img src="/shoes_Card/IMG/side_image2.png" alt="Side Image 2">
                <img src="/shoes_Card/IMG/side_image3.png" alt="Side Image 3">
                <img src="/shoes_Card/IMG/side_image4.png" alt="Side Image 4">
                <img src="/shoes_Card/IMG/side_image5.png" alt="Side Image 5">
                <img src="/shoes_Card/IMG/side_image6.png" alt="Side Image 6">
            </aside>

            <section class="image_container">
                <img src="/shoes_Card/IMG/center_image.png" alt="center image">
            </section>
        </section>

        <section class="content">
            <div class="content_header">
                <p>Sustainable Materials</p>
                <h1>NIke Revolution 8</h1>
                <h4>Men’s Road Running Shoes</h4>
            </div>

            <section class="price_section">
                <h2>MRP - $0.00</h2>
                <div>
                    <p>Inclusive of all taxes</p>
                    <p>Also includes all applicable duties</p>
                </div>
            </section>

            <section class="varriant">
                <img src="/shoes_Card/IMG/variant1.png" alt="Varriant 1">
                <img src="/shoes_Card/IMG/variant2.png" alt="Varriant 2">
                <img src="/shoes_Card/IMG/variant3.png" alt="Varriant 3">
                <img src="/shoes_Card/IMG/variant4.png" alt="Varriant 4">
            </section>

         <section class="size_section">
          <div class="size_header">
            <h4>Select Size</h4>
            <h4>Size Guide</h4>
          </div>
          
          <section class="sizes">
            <div class="size">UK 6</div>
            <div class="size">UK 6.5</div>
            <div class="size">UK 7</div>
            <div class="size">UK 7.5</div>
          </section>
        </section>
            <section class="button_container">
                <button class="add_to_bag">Add to Bag</button>
                <button class="wishlist">Favourite</button>
            </section>
        </section>
    </main>
</body>

</html>
